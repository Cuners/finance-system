version: '3.8'

services:
  auth.api:
    build:
      context: ./AuthService
      dockerfile: Auth.API/Dockerfile
    ports:
      - "8081:8080" 
    expose:
      - "8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - app

  budgetserver:
    build:
      context: ./FinanceService
      dockerfile: BudgetServer/Dockerfile
    ports:
      - "5000:5000" 
    expose:
      - "5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
    networks:
      - app

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"  # ← nginx слушает 8080 на хосте
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - auth.api
      - budgetserver
    networks:
      - app

networks:
  app:
    driver: bridge